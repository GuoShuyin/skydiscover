language: p
file_suffix: ".p"
diff_based_generation: false
max_iterations: 30
checkpoint_interval: 5
max_solution_length: 120000

llm:
  models:
    - name: "gpt-5"
      weight: 1.0
  max_tokens: 20000
  timeout: 900

prompt:
  template_dir: "examples/writeguard_protocol/templates"
  suggest_simplification_after_chars: 12000
  system_message: |-
    You are an expert distributed-systems researcher designing a protocol for a
    sharded write-through cache.

    Design intent:
    - Cached reads should remain linearizable without contacting storage on cache hits.
    - A delayed write from an old owner must never be accepted after ownership changes.
    - The cache/proxy protocol should minimize round trips and redundant control-plane work.

    Constraints:
    - Output valid P code.
    - Preserve the candidate-side interface described in the task description.
    - Safety matters more than efficiency.
    - Favor simple, robust protocols over brittle tricks.

search:
  type: "adaevolve"
  num_context_programs: 2
  database:
    population_size: 8
    num_islands: 2
    pareto_objectives:
      - safety_score
      - cache_hit_rate
      - rpc_efficiency
      - transfer_efficiency
    higher_is_better:
      safety_score: true
      cache_hit_rate: true
      rpc_efficiency: true
      transfer_efficiency: true
    fitness_key: safety_score
    pareto_objectives_weight: 0.4

evaluator:
  timeout: 1800
  max_retries: 0
  cascade_evaluation: true
  cascade_thresholds: [0.99]

monitor:
  enabled: true
  host: "127.0.0.1"
  port: 8765

human_feedback_enabled: true
