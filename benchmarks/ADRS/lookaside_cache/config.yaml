# Lookaside Cache Routing — P-native compile/check benchmark
# Usage: python -m skydiscover.cli initial_program.p evaluator.py -c config.yaml -s <strategy>
language: p
file_suffix: ".p"
max_iterations: 200
max_parallel_iterations: 4
checkpoint_interval: 5
diff_based_generation: true
max_solution_length: 220000

llm:
  api_base: https://api.openai.com/v1
  models:
    - name: "gpt-5"
      weight: 1.0
  max_tokens: 32000
  timeout: 600

prompt:
  system_message: "system_prompt.txt"

search:
  type: "adaevolve"
  num_context_programs: 4
  database:
    population_size: 20
    num_islands: 4
    use_unified_archive: true
    diversity_strategy: "code"
    novelty_weight: 0.1
    fitness_weight: 1.0

evaluator:
  timeout: 600
  max_retries: 1
  cascade_evaluation: false

agentic:
  enabled: false

monitor:
  enabled: true
  port: 8765
  host: "127.0.0.1"
  max_solution_length: 40000
